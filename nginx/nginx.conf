# /etc/nginx/nginx.conf
# TON Prediction Market — production nginx config
# Tested on nginx 1.24 / Ubuntu 22.04

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 2m;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # General API: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Bets: 10 req/s per IP (extra protection)
    limit_req_zone $binary_remote_addr zone=bets:10m rate=10r/s;
    # Telegram webhook: allow bursts (Telegram sends in batches)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/s;

    # ── Upstream ───────────────────────────────────────────────────────────────
    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name example.com www.example.com;   # ← замени на свой домен

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name example.com;                   # ← замени на свой домен

        # ── SSL (Let's Encrypt через certbot) ─────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:
                    ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:
                    ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;

        # ── Security headers ───────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer-when-downgrade always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # CSP: разрешаем Telegram Web App и наш API
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' https://telegram.org; "
            "connect-src 'self' wss://example.com https://tonapi.io https://toncenter.com; "
            "img-src 'self' data: https:; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "font-src 'self' https://fonts.gstatic.com;"
            always;

        # ── Фронтенд (статика) ────────────────────────────────────────────────
        root /var/www/tonpred;                     # ← папка с index.html, api.js
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;      # SPA fallback

            # Кеш статики
            location ~* \.(js|css|png|jpg|ico|woff2?)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api burst=60 nodelay;
            limit_req_status 429;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Ставки — отдельная зона с жёстким лимитом ─────────────────────────
        location /api/v1/bets {
            limit_req zone=bets burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Telegram webhook — без лимита на IP (Telegram один IP) ───────────
        location /api/v1/telegram/webhook {
            limit_req zone=webhook burst=200 nodelay;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 10s;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /api/v1/ws/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;

            # Обязательно для WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Долгоживущие соединения
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 5s;

            # Буферизация вредит WebSocket
            proxy_buffering off;
        }

        # ── Swagger docs — только на staging, закрыть на prod ────────────────
        location /docs {
            # Раскомментируй чтобы закрыть в production:
            # return 404;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Health check (для мониторинга) ────────────────────────────────────
        location /health {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            access_log off;
        }

        # ── Запрет на скрытые файлы (.env, .git и т.д.) ──────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
